services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bamboo_plus_db}
      POSTGRES_USER: ${POSTGRES_USER:-bamboo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bamboo1234}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bamboo} -d ${POSTGRES_DB:-bamboo_plus_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - bamboo-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-4001}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:4000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://bamboo:bamboo1234@db:5432/bamboo_plus_db?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@bamboo.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_SEED: ${RUN_SEED:-true}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4001/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    expose:
      - "4001"
    networks:
      - bamboo-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    networks:
      - bamboo-network

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bamboo-network

volumes:
  postgres-data:

networks:
  bamboo-network:
