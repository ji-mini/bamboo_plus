services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    environment:
      NODE_ENV: development
      PORT: ${BACKEND_PORT:-4001}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:4000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://bamboo:bamboo1234@db:5432/bamboo_plus_db?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@bamboo.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_SEED: ${RUN_SEED:-true}
    volumes:
      - ./backend:/app
      - backend-node-modules:/app/node_modules

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    expose:
      - "4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

  nginx:
    depends_on:
      frontend:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-4000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  backend-node-modules:
  frontend-node-modules:
